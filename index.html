<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors - The Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="battle-bg">
    <img src="images/70-705936_legend-of-rock-paper-scissors-battle-hd-png-removebg-preview (2).png" class="bg-fighter rock">
    <img src="images/70-705936_legend-of-rock-paper-scissors-battle-hd-png-removebg-preview (1).png" class="bg-fighter paper">
    <img src="images/3333333.png" class="bg-fighter scissors">
</div>

<div class="container text-center mt-5 main-card">

    <h1 class="title mb-3">🎮 Rock • Paper • Scissors</h1>

    <div class="Instruction mb-4">
        <h4>How to Play</h4>
        <p class="small-text">
            Rock beats Scissors • Scissors beats Paper • Paper beats Rock
        </p>
    </div>

    <div class="image1 mb-4">
        <img src="images/70-705936_legend-of-rock-paper-scissors-battle-hd-png-removebg-preview.png" alt="game image">
    </div>

    <div class="choices mb-4">
        <button class="btn-96"><span>🪨 Rock</span></button>
        <button class="btn-97"><span>📄 Paper</span></button>
        <button class="btn-98"><span>✂️ Scissors</span></button>
    </div>

    <button class="btn-99 mb-4"><span>🔄 Reset Game</span></button>

    <button id="result" class="result-box">Make your move!</button>

    <div id="scoreboard">
        <div>
            <h6>Player</h6>
            <span id="player-score">0</span>
        </div>
        <div>
            <h6>Computer</h6>
            <span id="computer-score">0</span>
        </div>
    </div>

</div>
<script>
        document.addEventListener('DOMContentLoaded', function () {
            var instructionsModal = new bootstrap.Modal(document.getElementById('instructionsModal'));
            instructionsModal.show();
        });
    </script>


    <script src="java.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
